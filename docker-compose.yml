services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic -c /app/Backend/alembic.ini upgrade head
      && uvicorn Backend.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
